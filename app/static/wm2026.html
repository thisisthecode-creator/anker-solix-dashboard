<style>
  :root {

    --panel: #ffffff;

    --border: #dfe3ea;
    --text: #1a1d24;
    --muted: #5f6773;
    --accent: #e5630d;
    --accent-2: #b8540b;
    --green: #16a34a;
    --blue: #2563eb;
    --red: #dc2626;
    --yellow: #ca8a04;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
  }
  .header-row {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  h1 span { color: var(--accent); }
  .sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .spacer { flex: 1; }
  .btn {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .filters {
    max-width: 1400px;
    margin: 0 auto;
    padding: 12px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-group { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-label {
    font-size: 11px;
    text-transform: uppercase;
    color: var(--muted);
    letter-spacing: 0.5px;
    margin-right: 4px;
    align-self: center;
  }
  .btn.chip { padding: 5px 11px; font-size: 12px; }
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 12px 20px 60px;
  }
  .day-group { margin-bottom: 28px; }
  .day-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding: 10px 0 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 14px;
  }
  .day-date {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
  }
  .day-weekday {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .day-count {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }
  .matches {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 10px;
  }
  .match {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 64px 1fr auto;
    gap: 12px;
    align-items: center;
    transition: border-color 0.15s;
  }
  .match:hover { border-color: var(--accent); }
  .match.live {
    border-color: var(--red);
    box-shadow: 0 0 0 1px var(--red);
  }
  .match.done { opacity: 0.55; }
  .match.upcoming-next { border-color: var(--accent); }
  .time { text-align: center; }
  .time-main {
    font-size: 18px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .time-local {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }
  .teams { min-width: 0; }
  .team-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .flag { font-size: 16px; flex-shrink: 0; }
  .vs {
    font-size: 10px;
    color: var(--muted);
    font-weight: 400;
    margin: 1px 0;
  }
  .meta {
    text-align: right;
    font-size: 10px;
    color: var(--muted);
    line-height: 1.4;
  }
  .meta-round {
    display: inline-block;
    padding: 2px 6px;
    background: var(--panel-2);
    border-radius: 4px;
    margin-bottom: 3px;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .group-A .meta-round { color: var(--blue); }
  .group-B .meta-round { color: var(--green); }
  .group-C .meta-round { color: var(--yellow); }
  .group-D .meta-round { color: var(--red); }
  .group-E .meta-round { color: #a78bfa; }
  .group-F .meta-round { color: #f472b6; }
  .group-G .meta-round { color: #2dd4bf; }
  .group-H .meta-round { color: #fb923c; }
  .group-I .meta-round { color: #38bdf8; }
  .group-J .meta-round { color: #a3e635; }
  .group-K .meta-round { color: #e879f9; }
  .group-L .meta-round { color: #facc15; }
  .group-KO .meta-round { color: var(--accent); }
  .countdown {
    font-size: 11px;
    color: var(--accent-2);
    font-weight: 600;
    margin-top: 2px;
  }
  .search {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 12px;
    border-radius: 8px;
    font-size: 13px;
    min-width: 180px;
  }
  .search:focus { outline: none; border-color: var(--accent); }
  .empty {
    text-align: center;
    padding: 40px;
    color: var(--muted);
  }
  .stats {
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }
  @media (max-width: 600px) {
    .matches { grid-template-columns: 1fr; }
    .match { grid-template-columns: 55px 1fr auto; padding: 10px 12px; }
    .team-row { font-size: 13px; }
  }
</style>

// Parse Warsaw date+time as a real Date object (using Europe/Warsaw context = UTC+2 during June-July 2026)
function warsawToDate(dateStr, timeStr) {
  const [y, mo, d] = dateStr.split("-").map(Number);
  const [h, mi] = timeStr.split(":").map(Number);
  // Warsaw is UTC+2 during June-July (CEST)
  return new Date(Date.UTC(y, mo - 1, d, h - 2, mi));
}

function phaseLabel(p) {
  return {
    group: "Gruppe",
    r32: "Sechzehntelfinale",
    r16: "Achtelfinale",
    qf: "Viertelfinale",
    sf: "Halbfinale",
    "3p": "Platz 3",
    final: "FINALE"
  }[p] || p;
}

const MONTHS = ["Jan", "Feb", "Mär", "Apr", "Mai", "Jun", "Jul", "Aug", "Sep", "Okt", "Nov", "Dez"];

function warsawParts(d) {
  const fmt = new Intl.DateTimeFormat("de-DE", {
    timeZone: "Europe/Warsaw",
    year: "numeric", month: "2-digit", day: "2-digit",
    weekday: "short", hour: "2-digit", minute: "2-digit", hour12: false
  });
  const parts = fmt.formatToParts(d);
  const get = t => parts.find(p => p.type === t).value;
  return {
    weekday: get("weekday").replace(".", ""),
    day: get("day"),
    month: MONTHS[parseInt(get("month")) - 1],
    year: get("year"),
    hour: get("hour"),
    minute: get("minute"),
    dayKey: `${get("year")}-${get("month")}-${get("day")}`
  };
}

function localTime(d, tz) {
  return new Intl.DateTimeFormat("de-DE", {
    timeZone: tz, hour: "2-digit", minute: "2-digit", hour12: false
  }).format(d);
}

function countdown(d, now) {
  const diff = d - now;
  if (diff < 0) return null;
  const days = Math.floor(diff / 86400000);
  const hours = Math.floor((diff % 86400000) / 3600000);
  const mins = Math.floor((diff % 3600000) / 60000);
  if (days > 0) return `in ${days}T ${hours}h`;
  if (hours > 0) return `in ${hours}h ${mins}m`;
  return `in ${mins} min`;
}

let filterPhase = "all";
let filterSearch = "";

function render() {
  const app = document.getElementById("app");
  const now = new Date();

  const enriched = MATCHES.map(m => ({
    ...m,
    ts: warsawToDate(m.d, m.t)
  }));

  let filtered = enriched;
  if (filterPhase === "upcoming") {
    filtered = filtered.filter(m => m.ts > now);
  } else if (filterPhase !== "all") {
    filtered = filtered.filter(m => m.p === filterPhase);
  }
  if (filterSearch) {
    const q = filterSearch.toLowerCase();
    filtered = filtered.filter(m =>
      m.h.toLowerCase().includes(q) ||
      m.a.toLowerCase().includes(q) ||
      VENUES[m.v].city.toLowerCase().includes(q) ||
      String(m.n).includes(q)
    );
  }

  // Sort by timestamp for chronological display
  filtered = [...filtered].sort((a, b) => a.ts - b.ts);

  const byDay = {};
  filtered.forEach(m => {
    const w = warsawParts(m.ts);
    if (!byDay[w.dayKey]) byDay[w.dayKey] = { info: w, matches: [] };
    byDay[w.dayKey].matches.push({ ...m, w });
  });

  const totalUpcoming = enriched.filter(m => m.ts > now).length;
  document.getElementById("stats").textContent =
    `${filtered.length} Spiele · ${totalUpcoming} ausstehend`;

  if (filtered.length === 0) {
    app.innerHTML = '<div class="empty">Keine Spiele gefunden</div>';
    return;
  }

  const upcoming = enriched.filter(m => m.ts > now).sort((a, b) => a.ts - b.ts);
  const nextMatchN = upcoming[0]?.n;

  const html = Object.values(byDay).map(day => {
    const matchesHtml = day.matches.map(m => {
      const isDone = m.ts < now && (now - m.ts) > 2 * 3600000;
      const isLive = m.ts < now && (now - m.ts) <= 2 * 3600000;
      const isNext = m.n === nextMatchN;
      const cls = ["match", `group-${m.g}`];
      if (isDone) cls.push("done");
      if (isLive) cls.push("live");
      if (isNext) cls.push("upcoming-next");

      const roundLabel = m.p === "group" ? `Gruppe ${m.g}` : phaseLabel(m.p);
      const cd = countdown(m.ts, now);
      const venue = VENUES[m.v];
      const warsaw = `${m.w.hour}:${m.w.minute}`;
      const local = localTime(m.ts, venue.tz);
      const hFlag = F[m.h] || "";
      const aFlag = F[m.a] || "";

      return `<div class="${cls.join(" ")}">
        <div class="time">
          <div class="time-main">${warsaw}</div>
          <div class="time-local">${local} lokal</div>
        </div>
        <div class="teams">
          <div class="team-row">${hFlag ? `<span class="flag">${hFlag}</span>` : ""}${m.h}</div>
          <div class="vs">vs</div>
          <div class="team-row">${aFlag ? `<span class="flag">${aFlag}</span>` : ""}${m.a}</div>
        </div>
        <div class="meta">
          <div class="meta-round">${roundLabel}</div>
          <div>#${m.n} · ${venue.city}</div>
          <div>${venue.name}</div>
          ${cd && !isLive ? `<div class="countdown">${cd}</div>` : ""}
          ${isLive ? `<div class="countdown" style="color:var(--red)">LIVE</div>` : ""}
        </div>
      </div>`;
    }).join("");

    return `<div class="day-group">
      <div class="day-header">
        <div class="day-date">${day.info.day}. ${day.info.month}</div>
        <div class="day-weekday">${day.info.weekday}</div>
        <div class="day-count">${day.matches.length} ${day.matches.length === 1 ? "Spiel" : "Spiele"}</div>
      </div>
      <div class="matches">${matchesHtml}</div>
    </div>`;
  }).join("");

  app.innerHTML = html;
}

document.getElementById("phaseFilters").addEventListener("click", e => {
  if (e.target.matches(".btn")) {
    document.querySelectorAll("#phaseFilters .btn").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    filterPhase = e.target.dataset.phase;
    render();
  }
});

document.getElementById("search").addEventListener("input", e => {
  filterSearch = e.target.value.trim();
  render();
});

render();
setInterval(render, 60000);
</script>
