name: Update Hetzner .env (Tapo)

# Manual trigger: writes/updates the four TAPO_* lines in /opt/anker-solix/.env
# on the Hetzner server, then restarts the container so the new values take
# effect. Existing entries are replaced; other lines in .env are preserved.
#
# Required GitHub repo secrets (Settings -> Secrets and variables -> Actions):
#   TAPO_ENABLED         e.g. "true"
#   TAPO_EMAIL           Tapo account email
#   TAPO_PASSWORD        Tapo account password (use the rotated one!)
#   TAPO_DEVICE_ALIAS    Device alias as shown in the Tapo app
#   HETZNER_SSH_KEY      Already configured for the deploy workflow

on:
  workflow_dispatch:

jobs:
  update-env:
    name: Update .env on Hetzner
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: Push TAPO_* variables via SSH
        uses: appleboy/ssh-action@v1
        env:
          TAPO_ENABLED: ${{ secrets.TAPO_ENABLED }}
          TAPO_EMAIL: ${{ secrets.TAPO_EMAIL }}
          TAPO_PASSWORD: ${{ secrets.TAPO_PASSWORD }}
          TAPO_DEVICE_ALIAS: ${{ secrets.TAPO_DEVICE_ALIAS }}
        with:
          host: 65.108.90.243
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          envs: TAPO_ENABLED,TAPO_EMAIL,TAPO_PASSWORD,TAPO_DEVICE_ALIAS
          script_stop: true
          script: |
            set -e
            ENV_FILE=/opt/anker-solix/.env
            touch "$ENV_FILE"
            chmod 600 "$ENV_FILE"

            # Replace-or-append helper. Reads value from environment to avoid
            # shell-quoting issues with special characters in the password.
            update_env() {
              local key="$1"
              local value="$2"
              local tmp="${ENV_FILE}.tmp"
              grep -v "^${key}=" "$ENV_FILE" > "$tmp" || true
              printf '%s=%s\n' "$key" "$value" >> "$tmp"
              mv "$tmp" "$ENV_FILE"
            }

            update_env "TAPO_ENABLED"      "$TAPO_ENABLED"
            update_env "TAPO_EMAIL"        "$TAPO_EMAIL"
            update_env "TAPO_PASSWORD"     "$TAPO_PASSWORD"
            update_env "TAPO_DEVICE_ALIAS" "$TAPO_DEVICE_ALIAS"

            chmod 600 "$ENV_FILE"

            # Confirm keys are present (without leaking values)
            echo "Updated keys:"
            grep -E "^TAPO_" "$ENV_FILE" | sed 's/=.*/=***/'

            # Restart container so new env vars take effect
            docker restart anker-solix
            sleep 5
            curl -sf http://localhost:8420/api/health || echo "HEALTH CHECK FAILED"
