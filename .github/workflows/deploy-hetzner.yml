name: Deploy to Hetzner

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 65.108.90.243
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            cd /opt/anker-solix
            git remote set-url origin https://github.com/thisisthecode-creator/anker-solix-dashboard.git
            git pull origin main
            docker build -t anker-solix .
            docker stop anker-solix || true
            docker rm anker-solix || true
            docker run -d \
              --name anker-solix \
              --restart unless-stopped \
              -p 8420:8420 \
              -v /opt/anker-solix/data:/app/data \
              --env-file /opt/anker-solix/.env \
              -e TZ=Europe/Warsaw \
              anker-solix
            sleep 5
            curl -sf http://localhost:8420/api/health || echo "HEALTH CHECK FAILED"

            # Sync wm26 static page into separate nginx container (localhost:8081)
            mkdir -p /opt/wm26
            cp /opt/anker-solix/app/static/wm2026.html /opt/wm26/index.html
            docker restart wm26 || echo "wm26 container not running"
            sleep 2
            curl -sf http://localhost:8081/ >/dev/null && echo "wm26 OK" || echo "wm26 FAILED"
