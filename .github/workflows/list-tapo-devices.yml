name: List All Tapo Devices

# Diagnostic: dump every device on the configured TP-Link cloud account so
# we can see the alias, deviceId, status and last-active timestamp of each.
# Useful when local control works but cloud commands keep failing - usually
# means a stale duplicate device is in the account.

on:
  workflow_dispatch:

jobs:
  list:
    name: List devices in TP-Link account
    runs-on: ubuntu-latest
    steps:
      - name: Run via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 65.108.90.243
          username: root
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            set -e
            docker exec anker-solix python3 -c "
            import asyncio, os, sys, json, base64
            sys.path.insert(0, '/app')
            import httpx, uuid

            async def main():
                email = os.environ['TAPO_EMAIL'].strip()
                password = os.environ['TAPO_PASSWORD'].strip()
                async with httpx.AsyncClient(timeout=15) as c:
                    r = await c.post('https://wap.tplinkcloud.com', json={
                        'method': 'login',
                        'params': {
                            'appType': 'Tapo_Android',
                            'cloudUserName': email,
                            'cloudPassword': password,
                            'terminalUUID': str(uuid.uuid4()),
                        },
                    })
                    token = r.json()['result']['token']
                    r = await c.post(f'https://wap.tplinkcloud.com?token={token}', json={'method': 'getDeviceList'})
                    devs = r.json()['result']['deviceList']
                    print(f'=== {len(devs)} device(s) in account ===')
                    for d in devs:
                        try:
                            alias = base64.b64decode(d.get('alias', '')).decode('utf-8')
                        except Exception:
                            alias = d.get('alias', '?')
                        print(json.dumps({
                            'alias': alias,
                            'device_id': d.get('deviceId'),
                            'device_type': d.get('deviceType'),
                            'device_model': d.get('deviceModel'),
                            'status': d.get('status'),
                            'is_same_region': d.get('isSameRegion'),
                            'app_server_url': d.get('appServerUrl'),
                            'fw_version': d.get('fwVer'),
                            'hw_version': d.get('hwVer'),
                            'device_mac': d.get('deviceMac'),
                            'role': d.get('role'),
                        }, indent=2))

            asyncio.run(main())
            "
