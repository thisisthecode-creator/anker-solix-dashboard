name: Backup Anker Data

# Each backup = FULL snapshot of /opt/anker-solix/data/ (not incremental).
# Stored in two places:
#  1. GitHub Actions artifact (90 days retention, easy download for recent)
#  2. Committed to `backups` branch (permanent, kept forever via git history)

on:
  schedule:
    # Daily at 03:30 UTC (= 05:30 Europe/Warsaw, after nightly log rotation)
    - cron: '30 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    name: Pull data archive from Hetzner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (for workflow source)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 65.108.90.243 >> ~/.ssh/known_hosts

      - name: Create tarball on server
        run: |
          ssh -i ~/.ssh/id_ed25519 root@65.108.90.243 '
            cd /opt/anker-solix &&
            tar -czf /tmp/anker-data-latest.tar.gz data/ &&
            ls -lh /tmp/anker-data-latest.tar.gz
          '

      - name: Download tarball
        run: |
          mkdir -p /tmp/backup
          scp -i ~/.ssh/id_ed25519 root@65.108.90.243:/tmp/anker-data-latest.tar.gz /tmp/backup/latest.tar.gz
          ls -lh /tmp/backup/

      - name: Upload as artifact (90 day retention)
        uses: actions/upload-artifact@v4
        with:
          name: anker-data-${{ github.run_number }}
          path: /tmp/backup/latest.tar.gz
          retention-days: 90
          if-no-files-found: error

      - name: Commit to backups branch (permanent archive)
        run: |
          TS=$(date -u +%Y-%m-%d)
          SIZE=$(du -h /tmp/backup/latest.tar.gz | cut -f1)
          WORK=/tmp/backups-work
          rm -rf "$WORK"
          mkdir -p "$WORK"
          cd "$WORK"
          git init -b backups -q
          git config user.name "backup-bot"
          git config user.email "backup@github-actions.local"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          # Fetch existing backups branch if it exists
          if git fetch origin backups 2>/dev/null; then
            git reset --hard origin/backups
          else
            echo "# Anker Solix Data Backups" > README.md
            echo "" >> README.md
            echo "Permanent archive of /opt/anker-solix/data/ tarballs." >> README.md
            echo "Each file is a FULL snapshot (not incremental)." >> README.md
            mkdir -p snapshots
          fi
          mkdir -p snapshots
          cp /tmp/backup/latest.tar.gz "snapshots/${TS}.tar.gz"
          cp /tmp/backup/latest.tar.gz snapshots/latest.tar.gz
          git add snapshots/ README.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing changed (same content as previous backup)"
          else
            git commit -m "Backup ${TS} (${SIZE})"
            git push origin backups
            echo "Pushed backup for ${TS} to backups branch"
          fi

      - name: Cleanup server tmp
        if: always()
        run: |
          ssh -i ~/.ssh/id_ed25519 root@65.108.90.243 'rm -f /tmp/anker-data-latest.tar.gz' || true
